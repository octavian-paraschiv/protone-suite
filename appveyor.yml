version: 5.0.{build}
skip_tags: true
image: Visual Studio 2019

environment:
    git_access_token:
        secure: ON4vmgHe1F5fEi4l35Nj+Ks2UmJ4v8fvh2wF9ixw50sHjcVLrHVZY5OwrAdJmSCd
    
before_build:
- git checkout ilmerge
- ps: .\prep_build.ps1 "$env:APPVEYOR_BUILD_VERSION" "$env:IS_RELEASE"
- type ".\ProTONE Suite\src\Framework\OPMediaBase\OPMedia.Core\Version.cs"

build_script:
- dotnet restore ".\ProTONE Suite\src\ProTONE Suite.sln"
- dotnet build ".\ProTONE Suite\src\ProTONE Suite.sln"
  
after_build:
- copy ".\ProTONE Suite\src\Installers\Romanian.isl" "C:\Program Files (x86)\Inno Setup 6\Languages"
- set PATH=%PATH%;"C:\Program Files (x86)\Inno Setup 6"
- ISCC /Q ".\ProTONE Suite\src\Installers\ProtoneSuite.iss"
- copy .\*.txt ".\ProTONE Suite\output"
- 7z a protone-setup.zip ".\ProTONE Suite\output\*.*"

artifacts:
- path: protone-setup.zip
  name: protone-setup

deploy:
    provider: FTP
    protocol: ftp
    host: 185.247.61.111
    username: ocparo_ftpops
    password: 
        secure: q5T1rZCQBkgSA0/G7P2vXQ==
    folder: content/ProTONE/current/
    application: protone-setup
  
on_success:
    - git config --global credential.helper store
    - ps: Add-Content "$env:USERPROFILE\.git-credentials" "https://$($env:git_access_token):x-oauth-basic@github.com`n"
    - git config --global user.email "octavian.paraschiv@gmail.com"
    - git config --global user.name "octavian-paraschiv"
    - git commit -a -m "build_%APPVEYOR_BUILD_VERSION% (release:%IS_RELEASE%)"
    - git push --all --progress origin
